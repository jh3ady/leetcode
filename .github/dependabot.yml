version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: ":arrow_up: ci"
    ignore:
      # pnpm/action-setup v5+ bundles pnpm 11 (still RC as of 2026-04) and
      # rejects our pnpm 10 lockfile. Revisit once pnpm 11 stable ships.
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]
    ignore:
      # pnpm/action-setup v5+ bundles pnpm 11 which rejects our lockfile v9.
      # Revisit when the repo migrates to pnpm 11.
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "increase"
    commit-message:
      prefix: ":arrow_up: chore"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/leetcode-ts"
    schedule:
      interval: "weekly"
    versioning-strategy: "increase"
    commit-message:
      prefix: ":arrow_up: chore"
      include: "scope"

  - package-ecosystem: "cargo"
    directory: "/leetcode-rs"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: ":arrow_up: chore"

  - package-ecosystem: "composer"
    directory: "/leetcode-php"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: ":arrow_up: chore"
